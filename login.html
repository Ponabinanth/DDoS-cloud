<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecureChain Cyber Defense</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        .login-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px var(--shadow-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .login-header p {
            color: var(--text-color);
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--shadow-color);
        }

        .form-group .password-toggle {
            position: relative;
        }

        .form-group .password-toggle i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.6;
        }

        .form-group .password-toggle i:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-color);
            cursor: pointer;
        }

        .remember-forgot input[type="checkbox"] {
            accent-color: var(--accent-color);
        }

        .remember-forgot a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-color), #00cc6a);
            color: var(--primary-color);
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--shadow-color);
        }

        .social-login {
            text-align: center;
            margin: 1.5rem 0;
        }

        .social-login p {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .social-btn {
            padding: 0.8rem 1.5rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .social-btn:hover {
            border-color: var(--accent-color);
            background: rgba(0, 255, 136, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 1rem;
            color: var(--text-color);
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .signup-link {
            text-align: center;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .signup-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.6;
        }

        .tab-btn.active {
            opacity: 1;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            opacity: 1;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .back-home {
            text-align: center;
            margin-top: 2rem;
        }

        .back-home a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.7;
            transition: all 0.3s;
        }

        .back-home a:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        .back-home a i {
            margin-right: 0.5rem;
        }

        .error-message {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .verification-note {
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1><i class="fas fa-shield-alt"></i> SecureChain</h1>
                <p>Cyber Defense Platform</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="login-tab" class="tab-content active">
                <div id="login-error" class="error-message"></div>
                
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-toggle">
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                            <i class="fas fa-eye" onclick="togglePassword('loginPassword', this)"></i>
                        </div>
                    </div>
                    
                    <div class="remember-forgot">
                        <label>
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-buttons">
                        <button class="social-btn" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('github')">
                            <i class="fab fa-github"></i> GitHub
                        </button>
                    </div>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signup-tab" class="tab-content">
                <div id="signup-error" class="error-message"></div>
                <div id="signup-success" class="success-message"></div>
                
                <div class="verification-note">
                    <i class="fas fa-info-circle"></i> After registration, you'll receive a verification email to activate your account.
                </div>
                
                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Create Password</label>
                        <div class="password-toggle">
                            <input type="password" id="signupPassword" placeholder="Create a password" required minlength="8">
                            <i class="fas fa-eye" onclick="togglePassword('signupPassword', this)"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="password-toggle">
                            <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
                            <i class="fas fa-eye" onclick="togglePassword('signupConfirmPassword', this)"></i>
                        </div>
                    </div>
                    
                    <div class="remember-forgot">
                        <label style="font-size: 0.75rem;">
                            <input type="checkbox" required> I agree to the 
                            <a href="#">Terms of Service</a> and 
                            <a href="#">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
            </div>

            <!-- Forgot Password Form -->
            <div id="forgot-tab" class="tab-content">
                <div id="forgot-success" class="success-message"></div>
                
                <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="forgotEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-envelope"></i> Send Reset Link
                    </button>
                </form>
            </div>

            <div class="back-home">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

<script src="js/api.js"></script>
    <script>
        // Tab switching
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tabName === 'login') {
                document.getElementById('login-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else if (tabName === 'signup') {
                document.getElementById('signup-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            } else if (tabName === 'forgot') {
                document.getElementById('forgot-tab').classList.add('active');
            }
            hideMessages();
        }

        function showForgotPassword() { showTab('forgot'); hideMessages(); }
        function hideMessages() { document.querySelectorAll('.error-message, .success-message').forEach(msg => msg.classList.remove('show')); }

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye-slash');
            icon.classList.toggle('fa-eye');
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showError('login-error', 'Please fill in all fields'); return; }

            try {
                const result = await api.login(email, password);
                if (result.token || result.user) {
                    const user = result.user || { email, name: email.split('@')[0] };
                    localStorage.setItem('securechain_current_user', JSON.stringify(user));
                    window.location.href = 'index.html';
                    return;
                }
            } catch (error) { console.log('API not available, using local storage'); }
            
            const users = JSON.parse(localStorage.getItem('securechain_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                localStorage.setItem('securechain_current_user', JSON.stringify(user));
                window.location.href = 'index.html';
            } else { showError('login-error', 'Invalid email or password'); }
        }

        async function handleSignup(event) {
            event.preventDefault();
            hideMessages();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            if (!name || !email || !password || !confirmPassword) { showError('signup-error', 'Please fill in all fields'); return; }
            if (password !== confirmPassword) { showError('signup-error', 'Passwords do not match'); return; }
            if (password.length < 8) { showError('signup-error', 'Password must be at least 8 characters'); return; }

            try {
                const result = await api.register(name, email, password);
                if (result.token || result.user) {
                    const user = result.user || { name, email };
                    localStorage.setItem('securechain_current_user', JSON.stringify(user));
                    window.location.href = 'index.html';
                    return;
                }
            } catch (error) { console.log('API not available, using local storage'); }
            
            const users = JSON.parse(localStorage.getItem('securechain_users') || '[]');
            if (users.find(u => u.email === email)) { showError('signup-error', 'Email already registered'); return; }
            const newUser = { id: Date.now(), name, email, password, createdAt: new Date().toISOString() };
            users.push(newUser);
            localStorage.setItem('securechain_users', JSON.stringify(users));
            localStorage.setItem('securechain_current_user', JSON.stringify(newUser));
            window.location.href = 'index.html';
        }

        function handleForgotPassword(event) {
            event.preventDefault();
            hideMessages();
            const email = document.getElementById('forgotEmail').value;
            const users = JSON.parse(localStorage.getItem('securechain_users') || '[]');
            const user = users.find(u => u.email === email);
            if (user) {
                document.getElementById('forgot-success').textContent = 'Password reset link sent to your email!';
                document.getElementById('forgot-success').classList.add('show');
                document.getElementById('forgotForm').reset();
            } else { showError('forgot-error', 'Email not found'); }
        }

        async function socialLogin(provider) {
            if (provider === 'google') {
                const btn = event.target.closest('.social-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    const googleUser = { id: 'google_' + Date.now(), name: 'Google User', email: 'user@gmail.com', provider: 'google', loginMethod: 'google', createdAt: new Date().toISOString() };
                    const users = JSON.parse(localStorage.getItem('securechain_users') || '[]');
                    if (!users.find(u => u.provider === 'google' && u.email === googleUser.email)) {
                        users.push(googleUser);
                        localStorage.setItem('securechain_users', JSON.stringify(users));
                    }
                    localStorage.setItem('securechain_current_user', JSON.stringify(googleUser));
                    window.location.href = 'index.html';
                } catch (error) { alert('Google login failed'); btn.innerHTML = '<i class="fab fa-google"></i> Google'; }
            } else if (provider === 'github') { alert('GitHub OAuth would redirect to GitHub'); }
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }
        window.onload = function() { const currentUser = localStorage.getItem('securechain_current_user'); };
    </script>
</body>
</html>
